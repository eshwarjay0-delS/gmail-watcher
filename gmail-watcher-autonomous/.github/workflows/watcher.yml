name: Gmail Watcher

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2 dateparser --quiet

      - name: Run watcher
        env:
          GMAIL_PASS_1: ${{ secrets.GMAIL_PASS_1 }}
          GMAIL_PASS_2: ${{ secrets.GMAIL_PASS_2 }}
          GMAIL_PASS_3: ${{ secrets.GMAIL_PASS_3 }}
          GMAIL_PASS_4: ${{ secrets.GMAIL_PASS_4 }}
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python -u watch_emails.py

      - name: Generate dashboard
        run: python -u generate_dashboard.py

      - name: Heartbeat
        run: echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > data/last_run.txt

      - name: Commit and push
        run: |
          git config user.name "Gmail Watcher Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ dashboard.html
          git diff --staged --quiet || git commit -m "📊 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main --force-with-lease
